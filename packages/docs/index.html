<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Croqueta is a lightweight JavaScript framework for building modern web applications using native web components and fine-grained reactivity"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+AU+NSW:wght@400&display=swap" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&display=block&icon_names=check,close,content_copy,dangerous,feedback,info,lightbulb,menu,routine,warning"
    />
    <script>
      (function () {
        const s = localStorage.getItem('croqueta-docs-theme');
        const m = window.matchMedia('(prefers-color-scheme: dark)');
        const t = s || (m.matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <link rel="stylesheet" href="./styles.scss" />
    <title>Croqueta</title>
  </head>
  <body>
    <div class="landing">
      <!-- HEADER -->
      <header class="container">
        <nav>
          <ul></ul>
          <ul>
            <li>
              <a href="https://github.com/mimopo/croqueta" title="Open in GitHub">
                <svg class="icon">
                  <use xlink:href="#github"></use>
                </svg>
              </a>
            </li>
            <li>
              <a href="#" onclick="toggleTheme()" title="Toggle dark/light theme" id="theme-toggle">
                <span class="material-symbols-outlined">routine</span>
              </a>
            </li>
          </ul>
        </nav>
      </header>
      <!-- MAIN -->
      <main class="container">
        <h1>Croqueta</h1>

        <img src="./docs/croqueta.webp" alt="Logo" width="73" height="120" />

        <h2>Hot and Tasty Frontend Framework</h2>
        <p>
          <em>Croqueta</em> is a lightweight JavaScript framework for building modern web applications using native web components and
          fine-grained reactivity
        </p>

        <a href="./docs/" role="button" class="outline">Get Started</a>
        <a href="https://github.com/mimopo/croqueta" role="button" class="outline contrast">GitHub</a>
      </main>
      <!-- FOOTER -->
      <footer class="container">
        <p>Made with <span class="heart">♥️</span> in Sevilla</p>
      </footer>
    </div>
    <!-- ICONS FROM BOOTSTRAP ICONS - https://icons.getbootstrap.com/ -->
    <svg width="0" height="0" class="icon-map">
      <symbol xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 16 16" id="github">
        <path
          d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8"
        ></path>
      </symbol>
    </svg>
    <!-- JS -->
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
